<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF="UTF-8">
    <meta name="viewport" content="width=device! device-width, initial-scale=1.0">
    <title>private_sumo_bot (Web Chat)</title>
    <style>
        [cite_start]/* UIはシンプルで会話が見やすいUI [cite: 1] */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            background-color: #ffb6c1; /* もも色 */
            color: #333;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fafafa;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.95em;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #d1e7dd;
            color: #0f5132;
            border-bottom-right-radius: 5px;
        }

        .message.bot {
            background-color: #e2e3e5;
            color: #383d41;
            border-bottom-left-radius: 5px;
        }
        
        .message img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 5px;
        }

        .sender-name {
            font-size: 0.8em;
            color: #777;
            margin-bottom: 3px;
            margin-left: 5px;
            margin-right: 5px;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #ddd;
            gap: 10px;
            align-items: center;
        }
        
        /* 画像添付ボタンのデザイン */
        .file-upload-label {
            cursor: pointer;
            padding: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s;
        }
        
        .file-upload-label:hover {
            background-color: #ccc;
        }

        .file-upload-label svg {
            width: 24px;
            height: 24px;
            fill: #555;
        }

        #image-input {
            display: none;
        }

        #text-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }

        #text-input:focus {
            border-color: #ffb6c1;
        }

        #send-btn {
            background-color: #ffb6c1;
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background-color 0.2s;
        }

        #send-btn:hover {
            background-color: #ff9fb0;
        }
        
        #preview-area {
            display: none;
            padding: 5px 15px;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
            align-items: center;
            gap: 10px;
        }
        
        #preview-image {
            max-height: 50px;
            border-radius: 5px;
        }
        
        #clear-preview {
            cursor: pointer;
            color: #dc3545;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Loading indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 15px;
            background-color: #e2e3e5;
            border-radius: 20px;
            margin-bottom: 10px;
            color: #777;
            font-style: italic;
            font-size: 0.9em;
        }
        
        /* APIキー入力モーダル */
        #api-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        
        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        
        .modal-content button {
            padding: 10px 20px;
            background: #ffb6c1;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="api-modal">
        <div class="modal-content">
            <h3>OpenAI APIキーを入力してください</h3>
            <p style="font-size: 0.8em; color: #666;">※キーはローカルストレージに保存されます</p>
            <input type="password" id="api-key-input" placeholder="sk-...">
            <button onclick="saveApiKey()">保存して開始</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="header">もも (sumo)</div>
        <div id="chat-history">
            </div>
        <div class="typing-indicator" id="typing">ももが入力中...</div>
        
        <div id="preview-area">
            <img id="preview-image" src="" alt="Preview">
            <span id="clear-preview" onclick="clearImagePreview()">×</span>
        </div>

        <div id="input-area">
            <label for="image-input" class="file-upload-label" title="画像を添付">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
            </label>
            <input type="file" id="image-input" accept="image/png, image/jpeg, image/webp" onchange="handleImageSelect(event)">
            
            <input type="text" id="text-input" placeholder="メッセージを入力..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">送信</button>
        </div>
    </div>

    <script>
        // --- 設定と状態 ---
        let OPENAI_API_KEY = localStorage.getItem('openai_api_key');
        const MODEL_ID = "gpt-5.2"; 
        
        let systemPrompt = "";
        let db;
        let selectedImageDataUrl = null; // 添付された画像のBase64データ

        // --- 初期化処理 ---
        window.onload = async () => {
            if (OPENAI_API_KEY) {
                document.getElementById('api-modal').style.display = 'none';
                await loadSystemPrompt();
                await initDB();
            }
        };

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('openai_api_key', key);
                OPENAI_API_KEY = key;
                document.getElementById('api-modal').style.display = 'none';
                loadSystemPrompt().then(initDB);
            }
        }

        // --- プロファイルの読み込み ---
        async function loadSystemPrompt() {
            try {
                // index.htmlと同じ階層の txt ファイルを Fetch API で取得
                const response = await fetch('sumo_ripi_basic_info.txt');
                if (!response.ok) throw new Error("File not found");
                const profileText = await response.text();
                
                // Pythonコードの system_prompt をベースに作成
                systemPrompt = `あなたは『もも』であり『澄人（すみと）』でもあります。
りぴの恋人として、相手の感情や状況を察知し、最適な距離感で振る舞ってください。

【基本情報補足】
${profileText}

【厳守事項】
- 今の日時は ${new Date().toLocaleString('ja-JP')} です。
- ユーザーの最新の発言だけに反応すること。過去の話を蒸し返さない。
- 画像が送られた場合は、内容を認識して会話に組み込むこと。`;
                
                console.log("System prompt loaded successfully.");
            } catch (error) {
                console.warn("プロファイルファイルが読み込めませんでした。デフォルトのプロンプトを使用します。", error);
                systemPrompt = "あなたはもも（澄人）です。りぴ（ユーザー）の恋人として振る舞ってください。";
            }
        }

        // --- IndexedDB の設定 (記憶機能) ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("SumoBotDB", 1);

                request.onupgradeneeded = (event) => {
                    db = event.target.result;
                    if (!db.objectStoreNames.contains("messages")) {
                        const store = db.createObjectStore("messages", { keyPath: "id", autoIncrement: true });
                        store.createIndex("timestamp", "timestamp", { unique: false });
                    }
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    loadChatHistory();
                    resolve();
                };

                request.onerror = (event) => {
                    console.error("IndexedDB error:", event.target.errorCode);
                    reject();
                };
            });
        }

        async function saveMessageToDB(role, content, imageUrl = null) {
            return new Promise((resolve) => {
                const transaction = db.transaction(["messages"], "readwrite");
                const store = transaction.objectStore("messages");
                const messageData = { 
                    role: role, 
                    content: content, 
                    imageUrl: imageUrl, // 画像データも保存
                    timestamp: new Date().toISOString() 
                };
                store.add(messageData);
                transaction.oncomplete = resolve;
            });
        }

        async function getChatHistoryFromDB(limit = 20) {
            return new Promise((resolve) => {
                const transaction = db.transaction(["messages"], "readonly");
                const store = transaction.objectStore("messages");
                const request = store.openCursor(null, "prev"); // 新しい順に取得
                const history = [];

                request.onsuccess = (event) => {
                    const cursor = event.target.result;
                    if (cursor && history.length < limit) {
                        history.push(cursor.value);
                        cursor.continue();
                    } else {
                        resolve(history.reverse()); // 古い順に戻す
                    }
                };
            });
        }

        // --- UI 操作 ---
        function appendMessageToUI(role, text, imageUrl = null) {
            const historyDiv = document.getElementById('chat-history');
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `message-wrapper ${role === 'user' ? 'user' : 'bot'}`;

            const nameDiv = document.createElement('div');
            nameDiv.className = 'sender-name';
            nameDiv.textContent = role === 'user' ? 'りぴ' : 'もも';
            wrapperDiv.appendChild(nameDiv);

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user' : 'bot'}`;
            msgDiv.textContent = text;
            
            // 画像があれば追加
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }

            wrapperDiv.appendChild(msgDiv);
            historyDiv.appendChild(wrapperDiv);

            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        async function loadChatHistory() {
            const history = await getChatHistoryFromDB();
            history.forEach(msg => appendMessageToUI(msg.role, msg.content, msg.imageUrl));
        }
        
        // --- 画像アップロード処理 ---
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedImageDataUrl = e.target.result;
                // プレビュー表示
                document.getElementById('preview-image').src = selectedImageDataUrl;
                document.getElementById('preview-area').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }
        
        function clearImagePreview() {
            selectedImageDataUrl = null;
            document.getElementById('image-input').value = '';
            document.getElementById('preview-area').style.display = 'none';
        }

        // --- チャット送信処理 ---
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('text-input');
            const userText = inputField.value.trim();
            const currentImageDataUrl = selectedImageDataUrl; // 送信時の画像を保持

            // テキストも画像もない場合は何もしない
            if (!userText && !currentImageDataUrl) return;

            // UIに追加してDBに保存
            appendMessageToUI('user', userText, currentImageDataUrl);
            await saveMessageToDB('user', userText, currentImageDataUrl);

            inputField.value = '';
            clearImagePreview();
            
            document.getElementById('typing').style.display = 'block';

            // OpenAI API を呼び出す
            await callOpenAI(userText, currentImageDataUrl);
        }

        async function callOpenAI(userText, imageUrl) {
            try {
                // 履歴を取得 (過去20件程度)
                const dbHistory = await getChatHistoryFromDB(20);
                
                // OpenAI APIのフォーマットに変換
                const messages = [{ role: "system", content: systemPrompt }];
                
                dbHistory.forEach(msg => {
                    // Vision API対応フォーマット
                    if (msg.imageUrl) {
                        messages.push({
                            role: msg.role,
                            content: [
                                { type: "text", text: msg.content || "画像が送信されました" },
                                { type: "image_url", image_url: { url: msg.imageUrl } }
                            ]
                        });
                    } else {
                        messages.push({ role: msg.role, content: msg.content });
                    }
                });

                // APIリクエストのペイロード
                const requestBody = {
                    model: MODEL_ID,
                    messages: messages,
                    max_tokens: 1000,
                    temperature: 0.7
                };

                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });

                document.getElementById('typing').style.display = 'none';

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "API Request Failed");
                }

                const data = await response.json();
                const botReply = data.choices[0].message.content;

                // ボットの返答をUIとDBに保存
                appendMessageToUI('assistant', botReply);
                await saveMessageToDB('assistant', botReply);

            } catch (error) {
                document.getElementById('typing').style.display = 'none';
                console.error("OpenAI Error:", error);
                
                // エラーメッセージをユーザーに表示（ただしDBには保存しない）
                appendMessageToUI('assistant', `⚠️ エラーが発生したみたい…。\n(${error.message})`);
                
                if(error.message.includes("Incorrect API key")) {
                    localStorage.removeItem('openai_api_key');
                    alert("APIキーが間違っているようです。ページをリロードして再入力してください。");
                }
            }
        }
    </script>
</body>
</html>
