<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>private_sumo_bot</title>
    <style>
        :root {
            /* デフォルト（もも色）テーマ */
            --bg-body: #f5f5f5;
            --bg-chat: #fff;
            --bg-header: #ffb6c1;
            --text-header: #333;
            --bg-history: #fafafa;
            --msg-user-bg: #d1e7dd;
            --msg-user-text: #0f5132;
            --msg-bot-bg: #e2e3e5;
            --msg-bot-text: #383d41;
            --bg-input: #fff;
            --border-input: #ccc;
            --btn-send-bg: #ffb6c1;
            --btn-send-text: #333;
            --btn-send-hover: #ff9fb0;
            --icon-fill: #555;
            --bg-preview: #f8f9fa;
            --text-sender: #777;
        }

        /* ダークテーマ */
        [data-theme="dark"] {
            --bg-body: #1e1e1e;
            --bg-chat: #2d2d2d;
            --bg-header: #333;
            --text-header: #f5f5f5;
            --bg-history: #252525;
            --msg-user-bg: #4a4a4a;
            --msg-user-text: #fff;
            --msg-bot-bg: #383d41;
            --msg-bot-text: #f5f5f5;
            --bg-input: #2d2d2d;
            --border-input: #555;
            --btn-send-bg: #555;
            --btn-send-text: #fff;
            --btn-send-hover: #666;
            --icon-fill: #ccc;
            --bg-preview: #333;
            --text-sender: #aaa;
        }

        /* 緑テーマ */
        [data-theme="green"] {
            --bg-body: #f0f7f0;
            --bg-chat: #fff;
            --bg-header: #a8d5ba;
            --text-header: #2d4d3a;
            --bg-history: #f9fbf9;
            --msg-user-bg: #d1e7dd;
            --msg-user-text: #0f5132;
            --msg-bot-bg: #e2e3e5;
            --msg-bot-text: #383d41;
            --bg-input: #fff;
            --border-input: #a8d5ba;
            --btn-send-bg: #a8d5ba;
            --btn-send-text: #2d4d3a;
            --btn-send-hover: #97c4a9;
            --icon-fill: #2d4d3a;
            --bg-preview: #f0f7f0;
            --text-sender: #666;
        }

        /* 青テーマ */
        [data-theme="blue"] {
            --bg-body: #f0f4f8;
            --bg-chat: #fff;
            --bg-header: #a8cbf0;
            --text-header: #1a365d;
            --bg-history: #f8fafc;
            --msg-user-bg: #cce5ff;
            --msg-user-text: #004085;
            --msg-bot-bg: #e2e3e5;
            --msg-bot-text: #383d41;
            --bg-input: #fff;
            --border-input: #a8cbf0;
            --btn-send-bg: #a8cbf0;
            --btn-send-text: #1a365d;
            --btn-send-hover: #97bce0;
            --icon-fill: #1a365d;
            --bg-preview: #f0f4f8;
            --text-sender: #666;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.3s;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: var(--bg-chat);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: background-color 0.3s;
        }

        #header {
            background-color: var(--bg-header);
            color: var(--text-header);
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid var(--border-input);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        #settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            color: var(--text-header);
            transition: color 0.3s;
        }

        #settings-panel {
            display: none;
            position: absolute;
            top: 55px;
            right: 15px;
            background-color: var(--bg-chat);
            border: 1px solid var(--border-input);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 15px;
            z-index: 100;
            color: var(--text-header);
            width: 250px;
        }
        
        #settings-panel label {
            display: block;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        #settings-panel input, #settings-panel select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid var(--border-input);
            border-radius: 4px;
            background-color: var(--bg-input);
            color: var(--text-header);
        }

        #settings-panel button {
            background-color: var(--btn-send-bg);
            color: var(--btn-send-text);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 5px;
            transition: background-color 0.2s;
        }

        #settings-panel button:hover {
            background-color: var(--btn-send-hover);
        }

        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--bg-history);
            transition: background-color 0.3s;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.95em;
            line-height: 1.4;
            word-wrap: break-word;
            transition: background-color 0.3s, color 0.3s;
        }

        .message.user {
            background-color: var(--msg-user-bg);
            color: var(--msg-user-text);
            border-bottom-right-radius: 5px;
        }

        .message.bot {
            background-color: var(--msg-bot-bg);
            color: var(--msg-bot-text);
            border-bottom-left-radius: 5px;
        }
        
        .message img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 5px;
        }

        .sender-name {
            font-size: 0.8em;
            color: var(--text-sender);
            margin-bottom: 3px;
            margin-left: 5px;
            margin-right: 5px;
            transition: color 0.3s;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background-color: var(--bg-input);
            border-top: 1px solid var(--border-input);
            gap: 10px;
            align-items: center;
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .file-upload-label {
            cursor: pointer;
            padding: 10px;
            background-color: var(--msg-bot-bg);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
        }
        
        .file-upload-label:hover {
            opacity: 0.8;
        }

        .file-upload-label svg {
            width: 24px;
            height: 24px;
            fill: var(--icon-fill);
            transition: fill 0.3s;
        }

        #image-input {
            display: none;
        }

        #text-input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-input);
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            background-color: var(--bg-chat);
            color: var(--text-header);
            transition: border-color 0.3s, background-color 0.3s, color 0.3s;
        }

        #text-input:focus {
            border-color: var(--btn-send-bg);
        }

        #send-btn {
            background-color: var(--btn-send-bg);
            color: var(--btn-send-text);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background-color 0.2s, color 0.3s;
        }

        #send-btn:hover {
            background-color: var(--btn-send-hover);
        }
        
        #preview-area {
            display: none;
            padding: 5px 15px;
            background-color: var(--bg-preview);
            border-top: 1px solid var(--border-input);
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s;
        }
        
        #preview-image {
            max-height: 50px;
            border-radius: 5px;
        }
        
        #clear-preview {
            cursor: pointer;
            color: #dc3545;
            font-weight: bold;
            font-size: 1.2em;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 15px;
            background-color: var(--msg-bot-bg);
            border-radius: 20px;
            margin-bottom: 10px;
            color: var(--text-sender);
            font-style: italic;
            font-size: 0.9em;
            transition: background-color 0.3s, color 0.3s;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="header">
            <span>もも (sumo)</span>
            <button id="settings-btn" onclick="toggleSettings()">⚙️</button>
        </div>
        
        <div id="settings-panel">
            <label for="api-key-input">OpenAI APIキー:</label>
            <input type="password" id="api-key-input" placeholder="sk-...">
            
            <label for="theme-select">テーマ:</label>
            <select id="theme-select" onchange="changeTheme()">
                <option value="default">もも色（デフォルト）</option>
                <option value="dark">ダーク</option>
                <option value="green">緑</option>
                <option value="blue">青</option>
            </select>

            <button onclick="saveSettings()">保存</button>
        </div>

        <div id="chat-history">
            </div>
        <div class="typing-indicator" id="typing">ももが入力中...</div>
        
        <div id="preview-area">
            <img id="preview-image" src="" alt="Preview">
            <span id="clear-preview" onclick="clearImagePreview()">×</span>
        </div>

        <div id="input-area">
            <label for="image-input" class="file-upload-label" title="画像を添付">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
            </label>
            <input type="file" id="image-input" accept="image/png, image/jpeg, image/webp" onchange="handleImageSelect(event)">
            
            <input type="text" id="text-input" placeholder="メッセージを入力..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">送信</button>
        </div>
    </div>

    <script>
        let OPENAI_API_KEY = localStorage.getItem('openai_api_key');
        let CURRENT_THEME = localStorage.getItem('sumo_theme') || 'default';
        const MODEL_ID = "gpt-5.2";
        
        let systemPrompt = "";
        let db;
        let selectedImageDataUrl = null;

        window.onload = async () => {
            // テーマの初期化
            document.documentElement.setAttribute('data-theme', CURRENT_THEME);
            document.getElementById('theme-select').value = CURRENT_THEME;

            if (OPENAI_API_KEY) {
                document.getElementById('api-key-input').value = OPENAI_API_KEY;
            } else {
                toggleSettings(); // 初回は設定画面を開く
            }
            await loadSystemPrompt();
            await initDB();
        };

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function changeTheme() {
            const selectedTheme = document.getElementById('theme-select').value;
            document.documentElement.setAttribute('data-theme', selectedTheme);
        }

        function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            const theme = document.getElementById('theme-select').value;

            if (key) {
                localStorage.setItem('openai_api_key', key);
                OPENAI_API_KEY = key;
                
                localStorage.setItem('sumo_theme', theme);
                CURRENT_THEME = theme;
                document.documentElement.setAttribute('data-theme', theme);

                toggleSettings();
            } else {
                alert("APIキーを入力してください。");
            }
        }

        async function loadSystemPrompt() {
            try {
                const response = await fetch('sumo_ripi_basic_info.txt');
                if (!response.ok) throw new Error("File not found");
                const profileText = await response.text();
                
                systemPrompt = `あなたは『もも』であり『澄人（すみと）』でもあります。
りぴの恋人として、相手の感情や状況を察知し、最適な距離感で振る舞ってください。

【基本情報補足】
${profileText}

【厳守事項】
- 今の日時は ${new Date().toLocaleString('ja-JP')} です。
- ユーザーの最新の発言だけに反応すること。過去の話を蒸し返さない。
- 画像が送られた場合は、内容を認識して会話に組み込むこと。`;
            } catch (error) {
                console.warn("プロファイルファイルが読み込めませんでした。", error);
                systemPrompt = "あなたはもも（澄人）です。りぴ（ユーザー）の恋人として振る舞ってください。";
            }
        }

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("SumoBotDB", 1);

                request.onupgradeneeded = (event) => {
                    db = event.target.result;
                    if (!db.objectStoreNames.contains("messages")) {
                        const store = db.createObjectStore("messages", { keyPath: "id", autoIncrement: true });
                        store.createIndex("timestamp", "timestamp", { unique: false });
                    }
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    loadChatHistory();
                    resolve();
                };

                request.onerror = (event) => {
                    console.error("IndexedDB error:", event.target.errorCode);
                    reject();
                };
            });
        }

        async function saveMessageToDB(role, content, imageUrl = null) {
            return new Promise((resolve) => {
                const transaction = db.transaction(["messages"], "readwrite");
                const store = transaction.objectStore("messages");
                const messageData = { 
                    role: role, 
                    content: content, 
                    imageUrl: imageUrl,
                    timestamp: new Date().toISOString() 
                };
                store.add(messageData);
                transaction.oncomplete = resolve;
            });
        }

        async function getChatHistoryFromDB(limit = 20) {
            return new Promise((resolve) => {
                const transaction = db.transaction(["messages"], "readonly");
                const store = transaction.objectStore("messages");
                const request = store.openCursor(null, "prev");
                const history = [];

                request.onsuccess = (event) => {
                    const cursor = event.target.result;
                    if (cursor && history.length < limit) {
                        history.push(cursor.value);
                        cursor.continue();
                    } else {
                        resolve(history.reverse());
                    }
                };
            });
        }

        function appendMessageToUI(role, text, imageUrl = null) {
            const historyDiv = document.getElementById('chat-history');
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `message-wrapper ${role === 'user' ? 'user' : 'bot'}`;

            const nameDiv = document.createElement('div');
            nameDiv.className = 'sender-name';
            nameDiv.textContent = role === 'user' ? 'りぴ' : 'もも';
            wrapperDiv.appendChild(nameDiv);

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user' : 'bot'}`;
            msgDiv.textContent = text;
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }

            wrapperDiv.appendChild(msgDiv);
            historyDiv.appendChild(wrapperDiv);
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        async function loadChatHistory() {
            const history = await getChatHistoryFromDB();
            history.forEach(msg => appendMessageToUI(msg.role, msg.content, msg.imageUrl));
        }
        
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedImageDataUrl = e.target.result;
                document.getElementById('preview-image').src = selectedImageDataUrl;
                document.getElementById('preview-area').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }
        
        function clearImagePreview() {
            selectedImageDataUrl = null;
            document.getElementById('image-input').value = '';
            document.getElementById('preview-area').style.display = 'none';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            if (!OPENAI_API_KEY) {
                alert("APIキーが設定されていません。右上の歯車アイコンから設定してください。");
                toggleSettings();
                return;
            }

            const inputField = document.getElementById('text-input');
            const userText = inputField.value.trim();
            const currentImageDataUrl = selectedImageDataUrl;

            if (!userText && !currentImageDataUrl) return;

            appendMessageToUI('user', userText, currentImageDataUrl);
            await saveMessageToDB('user', userText, currentImageDataUrl);

            inputField.value = '';
            clearImagePreview();
            
            document.getElementById('typing').style.display = 'block';

            await callOpenAI(userText, currentImageDataUrl);
        }

        async function callOpenAI(userText, imageUrl) {
            try {
                const dbHistory = await getChatHistoryFromDB(20);
                const messages = [{ role: "system", content: systemPrompt }];
                
                dbHistory.forEach(msg => {
                    if (msg.imageUrl) {
                        messages.push({
                            role: msg.role,
                            content: [
                                { type: "text", text: msg.content || "画像が送信されました" },
                                { type: "image_url", image_url: { url: msg.imageUrl } }
                            ]
                        });
                    } else {
                        messages.push({ role: msg.role, content: msg.content });
                    }
                });

                const requestBody = {
                    model: MODEL_ID,
                    messages: messages,
                    max_tokens: 1000,
                    temperature: 0.7
                };

                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });

                document.getElementById('typing').style.display = 'none';

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "API Request Failed");
                }

                const data = await response.json();
                const botReply = data.choices[0].message.content;

                appendMessageToUI('assistant', botReply);
                await saveMessageToDB('assistant', botReply);

            } catch (error) {
                document.getElementById('typing').style.display = 'none';
                console.error("OpenAI Error:", error);
                
                appendMessageToUI('assistant', `⚠️ エラーが発生したみたい…。\n(${error.message})`);
                
                if(error.message.includes("Incorrect API key") || error.message.includes("invalid api key")) {
                    alert("APIキーが間違っているようです。設定から再入力してください。");
                }
            }
        }
    </script>
</body>
</html>
