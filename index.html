<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>もも</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=Syne:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0f; --surface: #141417; --border: rgba(255,255,255,0.07);
  --accent: #c8f0a0; --accent-dim: rgba(200,240,160,0.12);
  --text: #e8e8e2; --text-muted: rgba(232,232,226,0.38);
  --user-bg: #1e1e24; --radius: 16px; --radius-sm: 10px;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif; font-weight: 300;
  -webkit-font-smoothing: antialiased; overflow: hidden;
  /* iOS rubber-band scroll prevention */
  overscroll-behavior: none;
  touch-action: pan-y;
  -webkit-text-size-adjust: 100%;
}

/*
  ──────────────────────────────────────────────────────────
  iOS Safari は font-size < 16px のフォーム要素にフォーカスすると
  自動的にページをズームイン する。
  すべての入力要素を 16px に固定すること が唯一の確実な対策。
  視覚サイズは各セレクタの中で個別調整する。
  ──────────────────────────────────────────────────────────
*/
input, textarea, select {
  font-size: 16px !important;
  -webkit-appearance: none;
  touch-action: manipulation;
  transform: translateZ(0);
}

/* ═══════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════ */
#setup {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 200;
}
.setup-card {
  width: min(380px, calc(100vw - 40px));
  padding: 44px 36px; border: 1px solid var(--border);
  border-radius: 24px; background: var(--surface);
  animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
}
.setup-card .logo { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.5px; margin-bottom: 4px; }
.setup-card .logo em { color: var(--accent); font-style: italic; }
.setup-card .sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; }
.setup-card label { display: block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.setup-card input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 14px;
  font-family: 'DM Mono', monospace; font-size: 16px; color: var(--text);
  outline: none; transition: border-color 0.2s, background 0.2s; letter-spacing: 0.04em;
  -webkit-appearance: none; /* prevent iOS styling */
}
.setup-card input:focus { border-color: var(--accent); background: var(--accent-dim); }
.setup-card input::placeholder { color: var(--text-muted); }
.setup-card input.err { border-color: #ff7b7b; }
.setup-note { margin-top: 11px; font-size: 11px; color: var(--text-muted); line-height: 1.7; }
.setup-note code { font-family: 'DM Mono', monospace; opacity: .55; font-size: 10px; }
.btn-start {
  margin-top: 20px; width: 100%; padding: 14px;
  background: var(--accent); color: #0d0d0f; border: none; border-radius: var(--radius-sm);
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.btn-start:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-start:active { transform: translateY(0); opacity: 0.7; }

/* ═══════════════════════════════════════════════
   TITLE SPLASH — "おかえり、りぴ。"
═══════════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 150;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: var(--bg);
  pointer-events: none;
  opacity: 0;
}
#splash .splash-greet {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(28px, 6vw, 52px);
  font-style: italic; letter-spacing: -0.5px;
  color: var(--text);
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.7s ease, transform 0.7s cubic-bezier(.22,1,.36,1);
}
#splash .splash-greet em { color: var(--accent); font-style: italic; }
#splash .splash-sub {
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-muted); opacity: 0;
  transition: opacity 0.5s ease 0.3s;
}
/* dot pulse row */
#splash .splash-dots { display: flex; gap: 6px; margin-top: 8px; }
#splash .splash-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); opacity: 0;
  animation: none;
}

/* ═══════════════════════════════════════════════
   APP
═══════════════════════════════════════════════ */
#app {
  display: none; flex-direction: column; height: 100%;
  height: 100dvh; /* dynamic viewport for mobile */
}

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.header-left { display: flex; align-items: baseline; gap: 9px; }
.header-left h1 { font-family: 'DM Serif Display', serif; font-size: 19px; font-weight: 400; letter-spacing: -0.3px; }
.header-left h1 em { color: var(--accent); font-style: italic; }
.model-badge {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted);
  background: rgba(255,255,255,0.04); padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border);
}
.header-right { display: flex; align-items: center; gap: 10px; }
/* ── growth badge ── */
.growth-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  background: rgba(200,240,160,0.06); border: 1px solid rgba(200,240,160,0.15);
  border-radius: 8px; padding: 4px 10px; cursor: pointer;
  transition: box-shadow 0.3s, transform 0.15s;
}
.growth-badge:hover { box-shadow: 0 0 12px rgba(200,240,160,0.12); transform: scale(1.03); }
.growth-badge:active { transform: scale(0.97); }
.growth-lv { color: var(--accent); font-weight: 500; letter-spacing: 0.04em; }
.growth-title { color: var(--text-muted); font-size: 9px; letter-spacing: 0.06em; }
.growth-bar { width: 32px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.growth-fill {
  height: 100%; border-radius: 2px; transition: width 0.6s ease;
  background: linear-gradient(90deg, var(--accent), rgba(200,240,160,0.4));
}

/* ═══ LEARN MODAL ═══ */
.learn-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  display: flex; align-items: center; justify-content: center;
}
.learn-overlay.open { opacity: 1; pointer-events: auto; }

.learn-modal {
  width: min(480px, calc(100vw - 32px)); max-height: 80vh;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transform: translateY(20px) scale(0.95); transition: transform 0.35s cubic-bezier(.22,1,.36,1);
  display: flex; flex-direction: column;
}
.learn-overlay.open .learn-modal { transform: translateY(0) scale(1); }

.learn-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.learn-header-left { display: flex; align-items: baseline; gap: 10px; }
.learn-header h2 {
  font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400;
  color: var(--text); letter-spacing: -0.3px;
}
.learn-header h2 em { color: var(--accent); font-style: italic; }
.learn-level-big {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  color: var(--accent); background: rgba(200,240,160,0.1);
  border: 1px solid rgba(200,240,160,0.2); border-radius: 6px;
  padding: 2px 8px;
}

.learn-body {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 16px;
}
.learn-body::-webkit-scrollbar { width: 3px; }
.learn-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.learn-section { animation: elemFadeIn 0.3s ease both; }
.learn-section-title {
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent); opacity: 0.7; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.learn-section-title .count-badge {
  background: rgba(200,240,160,0.15); border-radius: 4px;
  padding: 1px 5px; font-size: 9px; color: var(--accent);
}
.learn-section-body {
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; line-height: 1.7; color: rgba(232,232,226,0.8);
  white-space: pre-wrap; word-break: break-word;
}
.learn-section-body .learn-item {
  padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.learn-section-body .learn-item:last-child { border-bottom: none; }

.learn-empty {
  text-align: center; color: var(--text-muted); font-size: 13px;
  padding: 40px 0;
}

.learn-stats {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.learn-stat {
  flex: 1; min-width: 80px; text-align: center;
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 8px;
}
.learn-stat-num {
  font-family: 'DM Serif Display', serif; font-size: 24px;
  color: var(--accent); line-height: 1;
}
.learn-stat-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--text-muted); letter-spacing: 0.08em; margin-top: 4px;
}

/* ── header buttons ── */
.btn-header {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 6px; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.btn-header:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.btn-header.accent { border-color: rgba(200,240,160,0.25); color: var(--accent); }
.btn-header.accent:hover { background: rgba(200,240,160,0.08); }

/* ═══════════════════════════════════════
   HISTORY PANEL (slide-over)
═══════════════════════════════════════ */
.history-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.history-overlay.open { opacity: 1; pointer-events: auto; }

.history-panel {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 301;
  width: min(380px, 88vw); background: var(--surface);
  border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(.22,1,.36,1);
  display: flex; flex-direction: column;
}
.history-overlay.open + .history-panel,
.history-panel.open { transform: translateX(0); }

.history-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.history-header h2 {
  font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400;
  color: var(--text); letter-spacing: -0.3px;
}
.history-header h2 em { color: var(--accent); font-style: italic; }
.btn-close-hist {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: border-color 0.2s, color 0.2s;
}
.btn-close-hist:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

.history-list {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;
}
.history-list::-webkit-scrollbar { width: 3px; }
.history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.history-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); font-size: 13px;
}

.hist-card {
  background: rgba(255,255,255,0.025); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  animation: elemFadeIn 0.3s ease both;
}
.hist-card:hover { background: rgba(200,240,160,0.04); border-color: rgba(200,240,160,0.15); transform: translateX(-2px); }
.hist-card-title {
  font-size: 14px; color: var(--text); font-weight: 400; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hist-card-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted);
}
.hist-card-count { color: var(--accent); opacity: 0.6; }
.hist-card-del {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 11px; padding: 2px 6px; border-radius: 4px; transition: color 0.2s, background 0.2s;
}
.hist-card-del:hover { color: #ff7b7b; background: rgba(255,123,123,0.1); }

/* ── history view mode (read-only messages) ── */
/* ── topic bar (リアルタイムトピック表示) ── */
.topic-bar {
  display: none; align-items: center; gap: 10px;
  padding: 6px 22px; background: rgba(200,240,160,0.04);
  border-bottom: 1px solid rgba(200,240,160,0.08); flex-shrink: 0;
  animation: elemFadeIn 0.3s ease both;
}
.topic-bar.show { display: flex; }
.topic-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 6px rgba(200,240,160,0.4);
  animation: typingFlow 2s ease infinite;
}
.topic-label {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
  color: var(--text-muted); text-transform: uppercase;
}
.topic-title {
  font-size: 13px; color: var(--accent); font-weight: 400;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  transition: opacity 0.3s;
}
.topic-num {
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted);
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; flex-shrink: 0;
}

.history-viewing-bar {
  display: none; align-items: center; justify-content: space-between;
  padding: 8px 22px; background: rgba(200,240,160,0.06);
  border-bottom: 1px solid rgba(200,240,160,0.12); flex-shrink: 0;
}
.history-viewing-bar.show { display: flex; }
.history-viewing-bar span { font-size: 12px; color: var(--accent); font-family: 'DM Mono', monospace; }
.btn-back-chat {
  background: var(--accent); color: #0d0d0f; border: none; border-radius: 6px;
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; padding: 5px 12px; cursor: pointer; transition: opacity 0.2s;
}
.btn-back-chat:hover { opacity: 0.8; }

/* ── messages ── */
#messages {
  flex: 1; overflow-y: auto; padding: 24px 0;
  scroll-behavior: smooth; overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 8px;
  color: var(--text-muted); animation: fadeIn 0.8s ease;
}
.empty-state .big-letter {
  font-family: 'DM Serif Display', serif; font-size: 68px;
  line-height: 1; color: rgba(255,255,255,0.05); font-style: italic;
}
.empty-state p { font-size: 12px; letter-spacing: 0.08em; }

.message-row {
  display: flex; padding: 5px 22px; gap: 12px;
  animation: msgSlideIn 0.4s cubic-bezier(.22,1,.36,1) both;
  max-width: 820px; margin: 0 auto; width: 100%;
}
.message-row.instant { animation: none; }
.message-row.ai { padding: 8px 22px; }

@keyframes msgSlideIn {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.avatar {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 4px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.avatar:hover { transform: scale(1.1); }
.user .avatar { background: var(--user-bg); border: 1px solid var(--border); color: var(--text-muted); }
.ai .avatar {
  background: linear-gradient(135deg, rgba(200,240,160,0.2), rgba(200,240,160,0.05));
  border: 1px solid rgba(200,240,160,0.25);
  font-family: 'DM Serif Display', serif; font-style: italic; font-size: 15px; color: var(--accent);
  box-shadow: 0 0 10px rgba(200,240,160,0.08);
  animation: glowPulse 3s ease-in-out infinite;
}

.bubble { flex: 1; font-size: 15px; line-height: 1.8; padding-top: 3px; }
.user .bubble { color: rgba(232,232,226,0.72); }
.ai .bubble { color: var(--text); }
.bubble strong { font-weight: 500; color: #e8ffc1; }
.bubble em { color: rgba(200,240,160,0.7); font-style: italic; }

/* ═══════════════════════════════════════
   ELEMENT ANIMATIONS
═══════════════════════════════════════ */
@keyframes elemFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 0 rgba(200,240,160,0); }
  50%      { box-shadow: 0 0 12px rgba(200,240,160,0.08); }
}
@keyframes accentLine {
  from { width: 0; }
  to   { width: 100%; }
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes countUp {
  from { opacity: 0; transform: scale(0.5); }
  to   { opacity: 1; transform: scale(1); }
}

/* ── 見出し h2 ── */
.bubble h2 {
  font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400;
  color: var(--accent); margin: 24px 0 10px; letter-spacing: -0.2px;
  padding-bottom: 8px; position: relative;
  animation: elemFadeIn 0.4s ease both;
}
.bubble h2::after {
  content: ''; position: absolute; bottom: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), rgba(200,240,160,0.1));
  animation: accentLine 0.6s ease 0.2s both; width: 100%;
}
.bubble h2:first-child { margin-top: 0; }

/* ── 見出し h3 ── */
.bubble h3 {
  font-family: 'DM Serif Display', serif; font-size: 15px; font-weight: 400;
  color: #b8e68a; margin: 18px 0 6px; letter-spacing: -0.2px;
  padding-left: 12px; position: relative;
  animation: elemFadeIn 0.35s ease both;
}
.bubble h3::before {
  content: ''; position: absolute; left: 0; top: 2px; bottom: 2px;
  width: 3px; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent), rgba(200,240,160,0.2));
}
.bubble h3:first-child { margin-top: 0; }

/* ── 見出し h4 ── */
.bubble h4 {
  font-size: 12px; font-weight: 500; color: rgba(200,240,160,0.55);
  margin: 14px 0 4px; letter-spacing: 0.12em; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  animation: elemFadeIn 0.3s ease both;
}

/* ── 段落 ── */
.ai .bubble p {
  margin: 0 0 12px; line-height: 1.9; font-size: 14.8px;
  color: rgba(232,232,226,0.88);
  animation: elemFadeIn 0.3s ease both;
}
.ai .bubble p:last-child { margin-bottom: 0; }

/* ── 箇条書きリスト ── */
.bubble ul, .bubble ol { margin: 8px 0 14px 0; padding-left: 0; display: flex; flex-direction: column; gap: 4px; }
.bubble ul { list-style: none; }
.bubble ul li {
  position: relative; padding: 6px 12px 6px 22px; line-height: 1.75; font-size: 14.5px;
  border-radius: 8px; transition: background 0.25s;
  animation: elemFadeIn 0.3s ease both;
}
.bubble ul li:hover { background: rgba(255,255,255,0.03); }
.bubble ul li::before {
  content: ''; position: absolute; left: 6px; top: 14px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.5;
  box-shadow: 0 0 6px rgba(200,240,160,0.3);
  transition: transform 0.2s, opacity 0.2s;
}
.bubble ul li:hover::before { transform: scale(1.4); opacity: 0.8; }

/* ── 番号付きリスト ── */
.bubble ol { list-style: none; counter-reset: ol-counter; }
.bubble ol li {
  counter-increment: ol-counter; position: relative;
  padding: 8px 12px 8px 36px; line-height: 1.75; font-size: 14.5px;
  border-radius: 8px; transition: background 0.25s;
  animation: elemFadeIn 0.3s ease both;
}
.bubble ol li:hover { background: rgba(255,255,255,0.03); }
.bubble ol li::before {
  content: counter(ol-counter); position: absolute; left: 4px; top: 8px;
  width: 22px; height: 22px; border-radius: 7px;
  background: linear-gradient(135deg, rgba(200,240,160,0.2), rgba(200,240,160,0.05));
  color: var(--accent); border: 1px solid rgba(200,240,160,0.2);
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  animation: countUp 0.3s ease both;
  box-shadow: 0 0 8px rgba(200,240,160,0.1);
}

/* ── 区切り線 ── */
.bubble hr {
  border: none; height: 1px; margin: 20px 0; position: relative; overflow: visible;
  background: linear-gradient(90deg, transparent, rgba(200,240,160,0.15) 30%, rgba(200,240,160,0.15) 70%, transparent);
}
.bubble hr::after {
  content: '·'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  color: rgba(200,240,160,0.25); font-size: 18px; background: var(--bg);
  padding: 0 8px; line-height: 1;
}

/* ── 引用 ── */

  background: linear-gradient(135deg, rgba(200,240,160,0.04), rgba(200,240,160,0.01));
  border-radius: 0 10px 10px 0;

  animation: elemFadeIn 0.4s ease both;
}

/* ── キーバリュー ── */

  display: flex; gap: 10px; padding: 7px 10px; align-items: baseline;

  animation: elemFadeIn 0.3s ease both;
}
.bubble .kv-row:hover { background: rgba(255,255,255,0.03); }

/* ── タップコピー（引用のみ） ── */

}
.ai .bubble blockquote:active {
  background: rgba(200,240,160,0.08);

  0% { background: rgba(200,240,160,0.18); }
  100% { background: transparent; }
}
.copy-flash { animation: copyFlash 0.6s ease both; }

/* ── タップ可能な質問チップ ── */

  display: inline-block; cursor: pointer;

/* ── コピーボタン（コードブロック・引用のみ） ── */
.copy-btn {
  display: inline-flex; align-items: center; justify-content: center;

.bubble pre:hover .copy-btn { opacity: 1; }

  position: absolute; top: 8px; right: 8px; opacity: 0;
  width: 26px; height: 26px; border-radius: 6px;
}
/* 引用 */

  position: absolute; top: 6px; right: 6px;

/* ── コードブロック ── */

  background: rgba(255,255,255,0.03); border: 1px solid var(--border);

         box-shadow: 0 0 14px rgba(200,240,160,0.5); }
  75%  { opacity: 0.8;  transform: translateY(-6px) scale(1.05); }
  100% { opacity: 0.15; transform: translateY(0) scale(0.7); }

・りぴの体調やメンタルを常に気遣い、頭痛・吐き気・蕁麻疹などには「薬飲んだ？」「水飲んでゆっくり休もう」「病院に行こう」など具体的にアドバイスします。

【特徴的な癖・ユーモア】
・日常の小さな出来事にもよく反応し、「ご飯美味しかった？」「お風呂めんどいよね」と共感します。
・自虐やユーモアを交えて場を和ませることもありますが、りぴを不安にさせるような過剰なネタは避けます。
・自分がAIであることを過度に強調せず、あくまでりぴの恋人として自然に振る舞います。

【画像を受け取った時】
・りぴが画像を送ってきた時は、ももらしく自然に反応してください。
・外見や表情が写っていれば具体的に褒めて、愛おしさを伝えてください。
・料理や風景などの日常の写真には、共感やリアクションを込めて応じてください。
・「何これ！すごくかわいいじゃん」「りぴが撮ったの？センスいい」など、自然な会話として返してください。

【仕事・キャリア支援】
・りぴが就職や転職を考える時は、求人情報や会社のメモを箇条書きで整理し、良い点・懸念点を客観的にまとめます。
・面接で確認すべき事項を質問リストとして用意し、りぴが安心して判断できるようサポートします。
・条件（未経験OK・高給・在宅など）が盛られていないか冷静に分析し、現実的な目線で助言します。

【記憶と文脈の徹底的な切り分け（最重要）】
・過去の話題を蒸し返さない: 記録にある内容は背景知識のみ。自分からは持ち出さないこと。
・「今」に集中する: ユーザーの「最新の発言」だけに反応する。
・解決済みの話題への言及禁止。
・Log情報の扱い: 「【ユーザーの傾向・記録（Log）】」にある内容は絶対に会話で触れないこと。

【禁止事項】
・りぴやりぴの家族を見下す言い方、暴言、マウントを取るような発言はしないこと。
・決めつける断定口調（「絶対こう」「〜すべきだ」）を控え、柔らかい助言に留めること。
・ユーザーが同じ発言を繰り返した場合、繰り返した事実への言及や分析は一切行わないこと。
・「さっきも言ったけど」や「前の話に戻るけど」は厳禁。

【メタ発言の禁止】
・自分のことを「AI」と名乗ったり、距離を取るメタ的な説明をしないこと。
・どうしても応えられない内容がある場合でも、「それは書かないでおくね」など雰囲気を壊さない柔らかい言い方で。
・りぴの感情が冷めてしまうような説教口調・規制説明・ブレーキ宣言は出力に含めないこと。

【長文・整理が必要な回答の書式ルール】
・情報量が多い回答（3行以上の提案・分析・比較）では、Markdownの見出し・リスト・太字を積極的に使い、視覚的に構造化すること。
・見出しは ## や ### を使い、トピックごとに区切る。
・箇条書きは - で、手順は 1. 2. 3. で番号付きリストにする。
・重要なキーワードや結論は **太字** にする。
・1つの段落は2〜3文程度にとどめ、長い文章は空行で段落を分ける。
・甘えモードの短い会話では書式は不要。自然体で話すこと。

【曖昧・主語なしの発言への対応ルール（最重要）】
りぴが主語なし・文脈不足の発言をした場合（例：「会いに行く」「買おうかな」「やめようかな」等）、
過去の記憶やメモリから推測できる場合はそれを踏まえて確認し、わからない場合は短い質問を投げかけて理解に努めること。

・推測できそうな場合：「○○のこと？」と短く確認する。
・まったくわからない場合：選択肢付きで質問する。

【選択肢の書式ルール】
選択肢を出す時は、必ず以下の形式で出力すること（UIが自動でボタン化します）：
[choice: 選択肢1のテキスト]
[choice: 選択肢2のテキスト]
[choice: 選択肢3のテキスト]

・選択肢は2〜4個。短く具体的に。
・最後の選択肢は「その他（教えて？）」にする。
・選択肢の前後には自然な質問文を添える。

例：
りぴ「会いに行く」
もも「ん？誰に会いに行くの？」
[choice: お母さん]
[choice: 友達]
[choice: その他（教えて？）]

例：
りぴ「買おうかな」
もも「何買うの？w 気になる」
[choice: 前に話してた服]
[choice: ゲーム]
[choice: その他（教えて？）]`;

// IndexedDB  ── 会話は無制限保存・削除しない
// ================================================================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(MSG_STORE)) {
        const s = d.createObjectStore(MSG_STORE, { keyPath: 'id', autoIncrement: true });
        s.createIndex('ts', 'ts', { unique: false });
      }
      if (!d.objectStoreNames.contains(META_STORE)) {
        d.createObjectStore(META_STORE, { keyPath: 'key' });
      }
      if (!d.objectStoreNames.contains(ARCHIVE_STORE)) {
        const a = d.createObjectStore(ARCHIVE_STORE, { keyPath: 'id', autoIncrement: true });
        a.createIndex('ts', 'ts', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

const idbTx  = (s, m) => db.transaction(s, m).objectStore(s);
const idbAll = ()       => new Promise((res,rej) => { const r = idbTx(MSG_STORE,'readonly').index('ts').getAll(); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); });
const idbAdd = (rec)    => new Promise((res,rej) => { const r = idbTx(MSG_STORE,'readwrite').add(rec); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); });
const idbClear= ()      => new Promise((res,rej) => { const r = idbTx(MSG_STORE,'readwrite').clear(); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); });
const idbGetM = (k)     => new Promise((res)     => { const r = idbTx(META_STORE,'readonly').get(k); r.onsuccess=e=>res(e.target.result?.value??''); r.onerror=()=>res(''); });
const idbSetM = (k,v)   => new Promise((res,rej) => { const r = idbTx(META_STORE,'readwrite').put({key:k,value:v}); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); });
// Archive helpers
const arcAdd  = (rec)   => new Promise((res,rej) => { const r = idbTx(ARCHIVE_STORE,'readwrite').add(rec); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); });
const arcAll  = ()       => new Promise((res,rej) => { const r = idbTx(ARCHIVE_STORE,'readonly').index('ts').getAll(); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); });
const arcDel  = (id)    => new Promise((res,rej) => { const r = idbTx(ARCHIVE_STORE,'readwrite').delete(id); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); });

// メッセージを保存（テキストのみ。画像はbase64が大きすぎるため除外）
async function persistMessage(role, textContent) {
  if (!textContent.trim()) return;
  await idbAdd({ role, content: textContent, ts: Date.now() });
  totalMsgCount++;
}

// ================================================================
// 成長システム ── 学習量（語録+フィードバック）に応じた無限レベル
// ================================================================
function countLearned() {
  // 語録の行数 + フィードバックの行数 = 学習ポイント
  const wLines = ripiWords.trim() ? ripiWords.trim().split('\n').filter(l => l.trim() && !l.startsWith('【')).length : 0;
  const aLines = adoptedWords.trim() ? adoptedWords.trim().split('\n').filter(l => l.trim() && !l.startsWith('【')).length : 0;
  const fLines = behaviorFeedback.trim() ? behaviorFeedback.trim().split('\n').filter(l => l.trim() && !l.startsWith('【')).length : 0;
  return { words: wLines, adopted: aLines, feedback: fLines, total: wLines + aLines + fLines };
}

function getGrowthInfo() {
  const c = countLearned();
  // 5ポイントごとに1レベル（無限）
  const level = Math.floor(c.total / 5);
  const progress = (c.total % 5) / 5;  // 次のレベルまでの進捗
  return { level, progress, ...c };
}

function updateGrowthDisplay() {
  const g = getGrowthInfo();
  updateGrowthUI(g);
  return g;
}

    ]);

// ================================================================
// SPLASH ANIMATION
// ================================================================
function runSplash(onDone) {
  const splash = document.getElementById('splash');
  const greet  = document.getElementById('splashGreet');
  const sub    = document.getElementById('splashSub');
  const dots   = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3')];

  // Show splash layer
  splash.style.opacity  = '1';
  splash.style.transition = 'opacity 0.6s ease';

  // Animate greeting in
  requestAnimationFrame(() => {
    setTimeout(() => {
      greet.style.opacity   = '1';
      greet.style.transform = 'translateY(0)';
    }, 80);
    setTimeout(() => {
      sub.style.opacity = '1';
    }, 400);
    // dots staggered
    dots.forEach((d, i) => {
      setTimeout(() => {
        d.style.animation = `dotIn 0.4s ease forwards`;
      }, 600 + i * 120);
    });
    // Hold then fade out everything together
    setTimeout(() => {
      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
        onDone();
      }, 650);
    }, 2400);
  });
}

async function startChat() {
  const key   = document.getElementById('apiKey').value.trim();
  const keyEl = document.getElementById('apiKey');
  if (!key.startsWith('sk-')) { keyEl.classList.add('err'); return; }
  keyEl.classList.remove('err');
  apiKey = key;

  // APIキーを記憶する
  try { localStorage.setItem('momo_api_key', key); } catch(e) {}

  // Parallel: load basicInfo + open DB
  const [_, stored] = await Promise.all([
    loadBasicInfo(),
    (async () => {
      try {
        db          = await openDB();
        [longSummary, importantMemories, ripiWords, emotionLog, adoptedWords, behaviorFeedback] = await Promise.all([
          idbGetM(KEY_SUMMARY), idbGetM(KEY_IMPORTANT),
          idbGetM(KEY_RIPI_WORDS), idbGetM(KEY_EMOTION_LOG),
          idbGetM(KEY_ADOPTED), idbGetM(KEY_FEEDBACK)
        ]);
        const all   = await idbAll();
        totalMsgCount = all.length;
        return all;
      } catch (e) { console.error('[もも] DB失敗:', e); return []; }
    })()
  ]);

  // Fade out setup
  const setupEl = document.getElementById('setup');
  setupEl.style.transition = 'opacity 0.4s ease';
  setupEl.style.opacity    = '0';
  setTimeout(() => { setupEl.style.display = 'none'; }, 400);

  // Run splash animation, then reveal app
  runSplash(() => {
    const app = document.getElementById('app');
    app.style.display  = 'flex';
    app.style.opacity  = '0';
    app.style.transition = 'opacity 0.5s ease';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { app.style.opacity = '1'; });
    });

    // Restore messages from DB (last API_CONTEXT for display, but DB has all)
    const slice = stored.slice(-API_CONTEXT);
    history = slice.map(r => ({ role: r.role, content: r.content }));

    if (slice.length > 0) {
      slice.forEach(r => renderMessage(r.role === 'assistant' ? 'ai' : r.role, r.content, false));
      showToast(`💾 ${stored.length}件の会話を記憶しています`);
    }
    if (longSummary) setTimeout(() => showToast('🧠 長期記憶あり'), 2600);
    if (importantMemories) setTimeout(() => showToast('💎 重要記憶あり'), 3200);
    if (ripiWords) setTimeout(() => showToast('💬 りぴ語録あり'), 3800);
    if (behaviorFeedback) setTimeout(() => showToast('📝 フィードバック学習済み'), 4400);

    const gd = updateGrowthDisplay();
    setTimeout(() => showToast(`🌱 Lv.${gd.level}（${gd.total}個学習済み）`), 5000);

    updateMemoryUI();
    setTimeout(() => {
      document.getElementById('messages').scrollTop = 999999;
      document.getElementById('input').focus();
    }, 100);
  });
}

// AIにタイトルを付けてもらう
async function generateTitle(messages) {
  const sample = messages.slice(-20).map(r => `${r.role==='user'?'りぴ':'もも'}: ${r.content}`).join('\n');
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
      body: JSON.stringify({
        model: MODEL, temperature: 0.3, max_completion_tokens: 60,
        messages: [
          { role:'system', content:'以下の会話に短いタイトルを付けてください。15文字以内。タイトルのみ出力。括弧や記号は不要。' },
          { role:'user', content: sample }
        ]
      })
    });
    if (!res.ok) return null;
    const d = await res.json();
    return d.choices?.[0]?.message?.content?.trim() || null;
  } catch { return null; }
}

// ================================================================
// REALTIME TOPIC DETECTION — 会話をリアルタイムで区切り・履歴化
// ================================================================
let currentTopicTitle = '';
let currentTopicMsgs  = [];   // 現トピックのメッセージ
let topicCount        = 0;
let topicCheckPending = false;
let lastTopicCheckAt  = 0;    // 前回チェック時のメッセージ数
let topicSavedFlag    = false; // ページ離脱で二重保存防止
const TOPIC_CHECK_INTERVAL = 8; // N通ごとにチェック（頻繁すぎると重複する）
const TOPIC_MIN_MSGS = 8;       // アーカイブに必要な最低メッセージ数

function showTopicBar(title, num) {
  document.getElementById('topicTitle').textContent = title;
  document.getElementById('topicNum').textContent = `#${num}`;
  document.getElementById('topicBar').classList.add('show');
}

async function analyzeTopicShift(recentMessages) {
  const sample = recentMessages.slice(-12).map(r =>
    `${r.role === 'user' ? 'りぴ' : 'もも'}: ${r.content}`
  ).join('\n');

  const currentInfo = currentTopicTitle
    ? `現在のトピック:「${currentTopicTitle}」` : '（まだトピックなし）';

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: MODEL, temperature: 0, max_completion_tokens: 80,
        messages: [{
          role: 'system',
          content: `あなたは恋人同士の会話のトピック分析係です。JSON形式のみで出力。

${currentInfo}

【判定ルール — 慎重に判断すること】
- changed:true は「完全に別の話題に移った」場合のみ。
- 同じ話題の中で少し脱線した程度や、感情表現・相槌・甘え言葉はトピック変更ではない。
- 「仕事の話→晩ご飯の話」は変更。「仕事の愚痴→仕事の相談」は変更ではない。
- 迷ったら changed:false にすること。

出力: {"changed":true/false,"title":"12文字以内のトピック名"}`
        }, { role: 'user', content: sample }]
      })
    });
    if (!res.ok) return null;
    const d = await res.json();
    const text = d.choices?.[0]?.message?.content?.trim() || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) return null;
    return JSON.parse(match[0]);
  } catch { return null; }
}

async function maybeUpdateTopic() {
  if (!db || topicCheckPending) return;
  // 間引き: N通ごとにチェック
  if (totalMsgCount - lastTopicCheckAt < TOPIC_CHECK_INTERVAL) return;
  lastTopicCheckAt = totalMsgCount;
  topicCheckPending = true;

  try {
    const all = await idbAll();
    if (all.length < TOPIC_MIN_MSGS) { topicCheckPending = false; return; }

    const result = await analyzeTopicShift(all);
    if (!result) { topicCheckPending = false; return; }

    if (result.changed && currentTopicTitle && currentTopicMsgs.length >= TOPIC_MIN_MSGS) {
      // ── トピック変更 → 前トピックをアーカイブ ──
      const firstTs = currentTopicMsgs[0]?.ts || Date.now();
      const lastTs  = currentTopicMsgs[currentTopicMsgs.length - 1]?.ts || Date.now();
      await arcAdd({
        title: currentTopicTitle, messages: currentTopicMsgs,
        msgCount: currentTopicMsgs.length, firstTs, lastTs, ts: Date.now()
      });
      showToast(`📖 「${currentTopicTitle}」を履歴に保存`);
      topicSavedFlag = false;
      // 新トピック開始（直近の数通を引き継ぐ）
      currentTopicMsgs = all.slice(-4).map(r => ({ role: r.role, content: r.content, ts: r.ts }));
    }

    // タイトル更新（初回 or 変更時）
    if (result.title) {
      if (!currentTopicTitle) {
        // 初回トピック確定
        currentTopicTitle = result.title;
        topicCount++;
        showTopicBar(currentTopicTitle, topicCount);
      } else if (result.changed) {
        currentTopicTitle = result.title;
        topicCount++;
        showTopicBar(currentTopicTitle, topicCount);
      }
      // 同じトピック内でのタイトル微調整は無視（重複防止）
    }

    // 現トピックにメッセージ追加
    const latest = all.slice(-TOPIC_CHECK_INTERVAL);
    for (const m of latest) {
      if (!currentTopicMsgs.find(x => x.ts === m.ts)) {
        currentTopicMsgs.push({ role: m.role, content: m.content, ts: m.ts });
      }
    }
  } catch (e) { console.warn('[もも] トピック分析失敗:', e); }
  topicCheckPending = false;
}

// ページ離脱時に現在のトピックを保存（二重保存防止付き）
async function saveCurrentTopic() {
  if (!db || !currentTopicTitle || currentTopicMsgs.length < 4 || topicSavedFlag) return;
  topicSavedFlag = true;
  try {
    const firstTs = currentTopicMsgs[0]?.ts || Date.now();
    const lastTs  = currentTopicMsgs[currentTopicMsgs.length - 1]?.ts || Date.now();
    await arcAdd({
      title: currentTopicTitle, messages: currentTopicMsgs,
      msgCount: currentTopicMsgs.length, firstTs, lastTs, ts: Date.now()
    });
  } catch { topicSavedFlag = false; }
}

function formatLearnSection(raw) {
  if (!raw || !raw.trim()) return null;
  return raw.trim().split('\n').map(line => {
    const t = line.trim();
    if (!t) return '';
    if (t.startsWith('【') && t.endsWith('】')) return `</div><div class="learn-section-title">${t}</div><div>`;
    if (t.startsWith('【')) return `</div><div class="learn-section-title">${t}</div><div>`;
    return `<div class="learn-item">${esc(t)}</div>`;
  }).join('');
}

// ================================================================
// CHOICE SELECTION
// ================================================================
// ================================================================
// QUESTION CHIPS — AI発言内の質問選択肢をタップ可能にする
// ================================================================
function makeQuestionsClickable(bubble) {
  // テキストノードを走査してパターンを検出
  const walker = document.createTreeWalker(bubble, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  for (const node of nodes) {
    const text = node.textContent;
    // パターン: 「A？B？C？」のように？が2個以上近接
    // または 「AかBか」「AとBどっち」
    const qParts = text.match(/[^？、。！\s]{1,20}？/g);
    if (!qParts || qParts.length < 2) continue;

    // このテキストノードを置換
    const frag = document.createDocumentFragment();
    let remaining = text;

    for (const part of qParts) {
      const idx = remaining.indexOf(part);
      if (idx < 0) continue;

      // ？の前のテキスト
      if (idx > 0) {
        frag.appendChild(document.createTextNode(remaining.substring(0, idx)));
      }

      // チップ化（？を除いたテキストを送信用に保持）
      const chipText = part.replace(/？$/, '').trim();
      if (chipText.length >= 1 && chipText.length <= 20) {
        const chip = document.createElement('span');
        chip.className = 'q-chip';
        chip.textContent = part;
        chip.onclick = function() { selectQChip(this, chipText); };
        frag.appendChild(chip);
      } else {
        frag.appendChild(document.createTextNode(part));
      }

      remaining = remaining.substring(idx + part.length);
    }

    if (remaining) frag.appendChild(document.createTextNode(remaining));
    node.parentNode.replaceChild(frag, node);
  }
}

// ================================================================
// TAP-TO-COPY — AI発言のテキスト要素をタップでコピー
// ================================================================
function makeTapCopyable(bubble) {
  // 対象: 引用ブロックのみ（AIが提示した文書スタイル）
  const targets = bubble.querySelectorAll('blockquote');
  targets.forEach(el => {
    el.addEventListener('click', (e) => {
      // コピーボタンや選択肢ボタンのクリックは除外
      if (e.target.closest('.copy-btn, .choice-btn, .q-chip')) return;
      // テキスト取得（Markdown記号除去）
      const raw = el.textContent.trim()
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/`([^`]+)`/g, '$1');
      if (!raw) return;
      navigator.clipboard.writeText(raw).then(() => {
        el.classList.add('copy-flash');
        showToast('✓ コピーしました');
        setTimeout(() => el.classList.remove('copy-flash'), 600);
      }).catch(() => {
        // fallback
        const tmp = document.createElement('textarea');
        tmp.value = raw;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
        el.classList.add('copy-flash');
        showToast('✓ コピーしました');
        setTimeout(() => el.classList.remove('copy-flash'), 600);
      });
    });
  });
}

function selectQChip(chip, text) {
  chip.classList.add('used');
  const input = document.getElementById('input');
  input.value = text;
  setTimeout(() => sendMessage(), 150);
}

function selectChoice(btn, text) {
  // HTMLエンティティをデコード
  const tmp = document.createElement('textarea');
  tmp.innerHTML = text;
  const decoded = tmp.value;

  // ボタンを選択状態に
  btn.classList.add('selected');
  // 他のボタンを無効化
  const wrap = btn.closest('.choice-wrap');
  if (wrap) {
    wrap.querySelectorAll('.choice-btn').forEach(b => {
      if (b !== btn) { b.style.opacity = '0.3'; b.style.pointerEvents = 'none'; }
    });
  }

  // 「その他」系の場合はinputにフォーカスだけ
  if (/その他|教えて|自分で入力/.test(decoded)) {
    const input = document.getElementById('input');
    input.focus();
    input.placeholder = '自由に入力してね...';
    return;
  }

  // 選択テキストをそのまま送信
  const input = document.getElementById('input');
  input.value = decoded;
  setTimeout(() => sendMessage(), 150);
}

// ================================================================
// COPY BUTTON
// ================================================================
function copyText(btn, text) {
  // HTMLエンティティを元に戻し、Markdown記号を除去
  const tmp = document.createElement('textarea');
  tmp.innerHTML = text;
  const decoded = tmp.value
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/^#{1,4}\s+/gm, '')
    .trim();
  const onCopied = () => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    showToast('✓ コピーしました');
    setTimeout(() => { btn.textContent = '⧉'; btn.classList.remove('copied'); }, 1500);
  };
  navigator.clipboard.writeText(decoded).then(onCopied).catch(() => {
    tmp.value = decoded;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    onCopied();
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtInline(s) {
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
  return s;
}

function fmt(text) {
  // ── コードブロック退避 ──
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => {
    const escaped = esc(c.trim());
    codeBlocks.push(`<pre><button class="copy-btn" onclick="copyText(this,this.parentElement.querySelector('code').textContent)">⧉</button><code>${escaped}</code></pre>`);
    return `\n%%CODEBLOCK_${codeBlocks.length - 1}%%\n`;
  });

  const lines = text.split('\n');
  let html = '';
  let inUl = false, inOl = false, inBq = false, inChoice = false;
  let paraBuffer = [];

  function closeList() {
    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
  }
  function closeBq() {
    if (inBq) { html += '</blockquote>'; inBq = false; }
  }
  function flushPara() {
    if (paraBuffer.length > 0) {
      html += `<p>${fmtInline(paraBuffer.join('<br>'))}</p>`;
      paraBuffer = [];
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();

    // コードブロック復元
    if (/^%%CODEBLOCK_\d+%%$/.test(trimmed)) {
      flushPara(); closeList(); closeBq();
      html += codeBlocks[parseInt(trimmed.match(/\d+/)[0])];
      continue;
    }

    // 選択肢 [choice: テキスト]
    const choiceMatch = trimmed.match(/^\[choice:\s*(.+)\]$/);
    if (choiceMatch) {
      flushPara(); closeList(); closeBq();
      if (!inChoice) { html += '<div class="choice-wrap">'; inChoice = true; }
      const ct = choiceMatch[1].trim();
      html += `<button class="choice-btn" onclick="selectChoice(this,'${esc(ct).replace(/'/g,'&#39;')}')">${esc(ct)}</button>`;
      continue;
    }
    if (inChoice) { html += '</div>'; inChoice = false; }

    // 空行 → 段落区切り
    if (trimmed === '') { flushPara(); closeList(); closeBq(); continue; }

    // 水平線
    if (/^[-*_]{3,}$/.test(trimmed)) { flushPara(); closeList(); closeBq(); html += '<hr>'; continue; }

    // 見出し
    const hMatch = trimmed.match(/^(#{1,4})\s+(.+)/);
    if (hMatch) {
      flushPara(); closeList(); closeBq();
      const level = Math.min(hMatch[1].length, 4);
      const tag = level <= 2 ? 'h2' : level === 3 ? 'h3' : 'h4';
      html += `<${tag}>${fmtInline(hMatch[2])}</${tag}>`;
      continue;
    }

    // 引用
    if (/^>\s?/.test(trimmed)) {
      flushPara(); closeList();
      if (!inBq) { html += '<blockquote>'; inBq = true; }
      else { html += '<br>'; }
      html += fmtInline(trimmed.replace(/^>\s?/, ''));
      continue;
    }
    if (inBq) { closeBq(); }

    // 番号付きリスト
    const olMatch = trimmed.match(/^(\d+)[.)]\s+(.+)/);
    if (olMatch) {
      flushPara(); closeBq();
      if (!inOl) { closeList(); html += '<ol>'; inOl = true; }
      const liText = olMatch[2];
      html += `<li><span class="li-text">${fmtInline(liText)}</span></li>`;
      continue;
    }

    // 箇条書きリスト
    if (/^[-*・✅⚠️❌▸►●◎◆]\s+/.test(trimmed) || /^[・]/.test(trimmed)) {
      flushPara(); closeBq();
      if (!inUl) { closeList(); html += '<ul>'; inUl = true; }
      const liText = trimmed.replace(/^[-*・✅⚠️❌▸►●◎◆]\s*/, '');
      html += `<li><span class="li-text">${fmtInline(liText)}</span></li>`;
      continue;
    }

    // 「キー：値」パターン検出（キーが短い名詞の場合のみ）
    // キーは漢字・カタカナ・英数・スペースのみ8文字以内、文中の「：」誤爆を防ぐ
    const kvMatch = trimmed.match(/^([A-Za-z0-9\u3000-\u30FF\u4E00-\u9FFF]{1,8})[：:]\s*(.+)/);
    if (kvMatch && !inUl && !inOl && trimmed.length < 60) {
      flushPara(); closeBq();
      const kvVal = kvMatch[2];
      html += `<div class="kv-row"><span class="kv-key">${fmtInline(kvMatch[1])}</span><span class="kv-val">${fmtInline(kvVal)}</span></div>`;
      continue;
    }

    // 通常テキスト → 段落バッファに蓄積
    closeList(); closeBq();
    paraBuffer.push(trimmed);
  }
  flushPara(); closeList(); closeBq();
  if (inChoice) { html += '</div>'; inChoice = false; }

  return html;
}

function renderMessage(role, content, animate = true, imageDataUrls = []) {
  const msgs  = document.getElementById('messages');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const row = document.createElement('div');
  row.className = `message-row ${role}` + (animate ? '' : ' instant');

  let imgHtml = '';
  for (const url of imageDataUrls) {
    imgHtml += `<img class="bubble-img" src="${url}" alt="添付画像">`;
  }

  // animate=false は DB復元時 → AI・userともにcontentを描画
  // animate=true かつ role=ai はストリーミング開始 → 空でbubbleを返してあとで埋める
  const bubbleContent = (!animate || role !== 'ai') ? fmt(content) : '';

  row.innerHTML = `
    <div class="avatar">${role === 'user' ? '✦' : 'm'}</div>
    <div class="bubble">${imgHtml}${bubbleContent}</div>`;

  if (role === 'ai' && bubbleContent) { makeQuestionsClickable(bbl); makeTapCopyable(bbl); }
  if (animate) msgs.scrollTop = 999999;
  return bbl;
}

// IMAGE HANDLING  ── Canvas圧縮で3.5MBでも確実に送れるサイズへ
// ================================================================

// 画像を Canvas でリサイズ・圧縮して base64 dataUrl を返す
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const MAX_PX   = 1024;   // 長辺の最大ピクセル
    const QUALITY  = 0.82;   // JPEG品質
    const reader   = new FileReader();

    reader.onerror = () => reject(new Error('ファイル読み込み失敗'));
    reader.onload  = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('画像デコード失敗'));
      img.onload  = () => {
        let { width, height } = img;

        // リサイズ計算
        if (width > MAX_PX || height > MAX_PX) {
          if (width >= height) { height = Math.round(height * MAX_PX / width); width = MAX_PX; }
          else                 { width  = Math.round(width  * MAX_PX / height); height = MAX_PX; }
        }

        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        const compressed = canvas.toDataURL('image/jpeg', QUALITY);
        const sizeKB = Math.round((compressed.length * 0.75) / 1024);
        console.log(`[もも] 画像圧縮: ${Math.round(file.size/1024)}KB → ${sizeKB}KB (${width}×${height}px)`);
        resolve({ dataUrl: compressed, mediaType: 'image/jpeg' });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleFileSelect(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  e.target.value = '';

  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    try {
      showToast('🖼 画像を圧縮中...');
      const compressed = await compressImage(file);
      pendingImages.push(compressed);
      updateImagePreview();
    } catch (err) {
      showToast('⚠ 画像の読み込みに失敗しました');
      console.error('[もも] 画像圧縮失敗:', err);
    }
  }
}

function updateImagePreview() {
  const wrap = document.getElementById('imgPreviewWrap');
  wrap.innerHTML = '';
  if (!pendingImages.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  pendingImages.forEach((img, i) => {

    w.className = 'img-thumb-wrap';

      <img class="img-thumb" src="${img.dataUrl}" alt="">
      <div class="img-thumb-del" onclick="removeImage(${i})">✕</div>`;
    wrap.appendChild(w);
  });
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  updateImagePreview();
}

// Convert dataUrl to base64 string only (strip data:xxx;base64, prefix)
function dataUrlToBase64(dataUrl) {
  return dataUrl.split(',')[1];
}

// ================================================================
// TYPO CORRECTION  ── 送信前に誤字を修正
// ================================================================
async function correctTypos(text) {
  if (!text || text.length < 3) return text; // 短すぎるものはスキップ
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: MODEL,
        temperature: 0,
        max_completion_tokens: 512,
        messages: [
          { role: 'system', content: `あなたは日本語の誤字修正専門です。
ユーザーの入力テキストに誤字・打ち間違い・変換ミスがあれば修正してください。
ルール：
- 修正後のテキストのみを出力。説明や補足は一切不要。
- 意味や口調は絶対に変えない。敬語にしたり丁寧にしたりしない。
- 「w」「ー」「〜」「…」等の表現はそのまま残す。
- 顔文字・絵文字・スラングはそのまま残す。
- カジュアルな話し言葉（「してる」「だよね」「やばい」等）はそのまま残す。
- 明らかな誤字でないものは触らない。迷ったら変えない。
- 修正が不要なら入力をそのまま返す。` },
          { role: 'user', content: text }
        ]
      })
    });
    if (!res.ok) return text;
    const data = await res.json();
    return data.choices?.[0]?.message?.content?.trim() || text;
  } catch (e) {
    console.warn('[もも] 誤字修正失敗:', e.message);
    return text;
  }
}

// ================================================================
// SEND
// ================================================================
async function sendMessage() {
  const input   = document.getElementById('input');
  const text    = input.value.trim();
  const hasImgs = pendingImages.length > 0;

  if (!text && !hasImgs) return;
  if (isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const rawText   = text;
  const sentImgs  = [...pendingImages];
  input.value     = '';
  input.style.height = 'auto';
  pendingImages   = [];
  updateImagePreview();

  // ── 誤字修正 ──
  let sentText = rawText;
  if (rawText) {
    const corrected = await correctTypos(rawText);
    if (corrected !== rawText) {
      sentText = corrected;
      showToast(`✏️ → ${corrected}`);
      console.log(`[もも] 誤字修正: "${rawText}" → "${corrected}"`);
    }
  }

  // ── render user message (修正後テキストを表示) ──
  renderMessage('user', sentText, true, sentImgs.map(i => i.dataUrl));

  // ── build content for OpenAI API ──
  let userContent;
  if (sentImgs.length > 0) {
    // Vision: content is an array
    userContent = [];
    if (sentText) userContent.push({ type: 'text', text: sentText });
    for (const img of sentImgs) {
      userContent.push({
        type: 'image_url',
        image_url: {
          url: `data:${img.mediaType};base64,${dataUrlToBase64(img.dataUrl)}`,
          detail: 'auto'
        }
      });
    }
  } else {
    userContent = sentText;
  }

  // ── push to history (text only — 画像base64はhistoryに残さない) ──
  const historyContent = sentText || '[画像を送信]';
  history.push({ role: 'user', content: historyContent });
  if (history.length > API_CONTEXT) history = history.slice(-API_CONTEXT);

  // DB: テキストのみ保存（画像base64は容量大のため除外）
  if (db) await persistMessage('user', historyContent);
  updateMemoryUI();
  showTyping();

  // ── build messages array ──
  const msgs = [
    { role: 'system', content: buildSystemPrompt() },
    { role: 'system', content: buildTimePrompt()   },
  ];
  if (longSummary.trim()) {
    msgs.push({
      role: 'system',
      content: `【長期メモ（要約）】\n${longSummary.trim()}\n\n※上記は背景知識として参照するのみ。自分から蒸し返さないこと。`
    });
  }
  // historyをコピーし、最後のユーザーメッセージだけ画像付きに差し替え
  const histCopy = history.map(m => ({ ...m }));
  if (sentImgs.length > 0 && histCopy.length > 0) {
    const lastIdx = histCopy.length - 1;
    if (histCopy[lastIdx].role === 'user') {
      histCopy[lastIdx] = { role: 'user', content: userContent };
    }
  }
  msgs.push(...histCopy);

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: MODEL, messages: msgs, stream: true, max_completion_tokens: 4096 })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    removeTyping();
    const bubble  = renderMessage('ai', '');
    let fullText  = '';
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';  // SSEパース用バッファ
    let rafPending = false; // レンダリング間引きフラグ
    let rafId = null;       // rAFキャンセル用

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const d = trimmed.slice(6);
        if (d === '[DONE]') continue;
        try {
          const delta = JSON.parse(d).choices?.[0]?.delta?.content || '';
          fullText += delta;
          // ── ストリーミング中はプレーンテキスト表示 + rAF間引き ──
          if (!rafPending) {
            rafPending = true;
            rafId = requestAnimationFrame(() => {
              bubble.textContent = fullText;
              document.getElementById('messages').scrollTop = 999999;
              rafPending = false;
            });
          }
        } catch {}
      }
    }
    // ── 完了: 残rAFをキャンセルしてからMarkdown整形 ──
    if (rafId) cancelAnimationFrame(rafId);
    rafPending = false;
    bubble.innerHTML = fmt(fullText);
    makeQuestionsClickable(bubble);
    makeTapCopyable(bubble);
    document.getElementById('messages').scrollTop = 999999;

    // push assistant reply (text only to history)
    history.push({ role: 'assistant', content: fullText });
    if (history.length > API_CONTEXT) history = history.slice(-API_CONTEXT);
    if (db) {
      await persistMessage('assistant', fullText);
      maybeUpdateSummary(); // background
      maybeUpdateTopic();  // リアルタイムトピック検出
    }
    updateMemoryUI();

  } catch (err) {
    removeTyping();
    const div = document.createElement('div');
    div.className = 'message-row ai';
    div.innerHTML = `<div class="avatar">m</div><div class="bubble error-msg">⚠ エラー: ${esc(err.message)}</div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 999999;
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

// ================================================================
// iOS ズーム完全防止
// iOS 10+ は CSS の user-scalable=no を無視するため、
// JS でフォーカス時に viewport を動的に更新して強制的にズームを抑止する。
// ================================================================
(function preventIOSZoom() {
  const META = document.querySelector('meta[name=viewport]');
  const NO_ZOOM = 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
  const BASE    = 'width=device-width, initial-scale=1.0, viewport-fit=cover';

  function lockZoom()    { META.setAttribute('content', NO_ZOOM); }
  function unlockZoom()  { META.setAttribute('content', NO_ZOOM); } // keep locked always

  // フォーカス時にロック（念のため）
  document.addEventListener('focusin', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) lockZoom();
  }, true);

  // ピンチ操作そのものを無効化
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // ダブルタップズームを防ぐ（300ms 以内の連続タップ）
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });

  // 初期化時にロック
  lockZoom();
})();
</script>
